# $schema=https://www.schemastore.org/github-workflow.json
name: publish library to NPM package registry
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish-library
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: checkout codebase
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: prepare development environment
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.1
          sha256-checksum: 02f4810a06b7386368912d4dbf71d8ba3dbbc80b743c11dbf36e9dc30eb73433 # v0.17.1 linux amd64

      - name: load cache for runtime dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./package/node_modules
          key: runtime-dependencies-${{ hashFiles('./package/pnpm-lock.yaml') }}-v1

      - run: devbox run task --verbose publish
